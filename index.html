document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

splay:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);color:var(--fg);font-size:13px;padding:11px 15px;border-radius:8px\" style-hover=\"border-color:var(--accent);color:var(--accent);background:var(--accent-soft)\"><span style=\"color:var(--accent)\">in<\u002Fspan>linkedin<span style=\"color:var(--muted)\">↗<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- experience -->\n    <div id=\"experience\" style=\"padding:8px 0 clamp(56px,9vw,78px);scroll-margin-top:80px\">\n      <div style=\"font-size:12px;color:var(--muted);margin-bottom:28px\">01 ✿ experience<\u002Fdiv>\n      <sc-for list=\"{{ exp }}\" as=\"job\" hint-placeholder-count=\"4\">\n        <div style=\"display:grid;grid-template-columns:34px 1fr;gap:clamp(12px,3vw,20px);padding:22px 0;border-top:1px solid var(--border)\">\n          <div style=\"font-size:12px;color:var(--accent)\">{{ job.num }}<\u002Fdiv>\n          <div>\n            <div style=\"display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:12px\">\n              <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:17px\">{{ job.company }} <span style=\"color:var(--muted);font-weight:400;font-size:13.5px\">/ {{ job.role }}<\u002Fspan><\u002Fspan>\n              <div style=\"font-size:11.5px;color:var(--muted);text-align:right;line-height:1.55\">{{ job.dates }}<sc-if value=\"{{ job.loc }}\" hint-placeholder-val=\"{{ true }}\"><br>{{ job.loc }}<\u002Fsc-if><\u002Fdiv>\n            <\u002Fdiv>\n            <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px\">\n              <sc-for list=\"{{ job.bullets }}\" as=\"b\" hint-placeholder-count=\"3\">\n                <li style=\"position:relative;padding-left:20px;font-size:13.5px;line-height:1.55;color:var(--fg);opacity:.82\"><span style=\"position:absolute;left:0;color:var(--accent)\">✿<\u002Fspan>{{ b }}<\u002Fli>\n              <\u002Fsc-for>\n            <\ ted)\">\n      <a href=\"mailto:yyoon25@jh.edu\" style=\"color:var(--accent)\" style-hover=\"opacity:.8\">yyoon25@jh.edu<\u002Fa>\n      <span>✿ 2026 jasmine yoon<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- project window -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeModal }}\" style=\"position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,.6);backdrop-filter:blur(3px)\">\n      <div style=\"width:100%;max-width:540px;background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.5)\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)\">\n          <span style=\"display:flex;align-items:center;gap:8px\"><span style=\"display:flex;gap:5px\"><span style=\"width:9px;height:9px;border-radius:50%;background:var(--accent);opacity:.7\"><\u002Fspan><span style=\"width:9px;height:9px;border-radius:50%;background:var(--border)\"><\u002Fspan><span style=\"width:9px;height:9px;border-radius:50%;background:var(--border)\"><\u002Fspan><\u002Fspan>{{ mp.file }}<\u002Fspan>\n          <button sc-camel-on-click=\"{{ closeModal }}\" style=\"cursor:pointer;background:transparent;border:0;color:var(--muted);font-size:16px\" style-hover=\"color:var(--accent)\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"height:150px;background:repeating-linear-gradient(45deg,var(--accent-soft),var(--accent-soft) 12px,transparent 12px,transparent 24px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center\"><span style=\"font-size:12px;color:var(--muted)\">✿ project preview<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:24px 26px 28px\">\n          <div style=\"font-size:11px;color:var(--accent);margin-bottom:8px\">{{ mp.kind }}<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:22px;margin-bottom:12px\">{{ mp.title }}<\u002Fdiv>\n          <div style=\"font-size:13.5px;line-height:1.65;color:var(--muted)\">{{ mp.long }}<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin:18px 0 22px\">\n            <sc-for list=\"{{ mp.tech }}\" as=\"t\" hint-placeholder-count=\"3\">\n              <span style=\"font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:3px 8px\">{{ t }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n            <sc-if value=\"{{ mp.repo }}\" hint-placeholder-val=\"{{ true }}\">\n              <a href=\"{{ mp.repo }}\" target=\"_blank\" rel=\"noopener\" style=\"background:var(--accent);color:var(--bg);font-weight:500;font-size:12.5px;padding:9px 16px;border-radius:7px\" style-hover=\"opacity:.9\">github ↗<\u002Fa>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ mp.demo }}\" hint-placeholder-val=\"{{ false }}\">\n              <a href=\"{{ mp.demo }}\" target=\"_blank\" rel=\"noopener\" style=\"border:1px solid var(--border);color:var(--fg);font-size:12.5px;padding:9px 16px;border-radius:7px\" style-hover=\"border-color:var(--accent)\">demo ↗<\u002Fa>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentVibe&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Lilac&quot;,&quot;Rose&quot;,&quot;Mint&quot;],&quot;default&quot;:&quot;Rose&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Personality&quot;},&quot;showStatus&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Personality&quot;},&quot;statusText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Open to new-grad roles&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Personality&quot;}}\">\nclass Component extends DCLogic {\n  state = { dark: true, modalOpen: false, modalI: 0, wordI: 0 };\n\n  NEUTRAL = {\n    dark:  { '--bg':'#0b0b0c','--panel':'#131315','--fg':'#e6e6e9','--muted':'#7d7d86','--border':'rgba(255,255,255,.10)' },\n    light: { '--bg':'#ffffff','--panel':'#fafafa','--fg':'#101012','--muted':'#6a6a72','--border':'rgba(0,0,0,.09)' }\n  };\n  ACCENTS = {\n    Lilac: { dark:'#c9a9f5', light:'#7c5bd1' },\n    Rose:  { dark:'#f0a6c2', light:'#c85a86' },\n    Mint:  { dark:'#5fd39a', light:'#12855a' }\n  };\n  WORDS = ['pipelines', 'tools', 'products', 'systems'];\n\n  rgb(hex) {\n    const n = hex.replace('#',''); return [parseInt(n.slice(0,2),16), parseInt(n.slice(2,4),16), parseInt(n.slice(4,6),16)];\n  }\n  hexToSoft(hex, a = 0.15) {\n    const [r,g,b] = this.rgb(hex); return `rgba(${r},${g},${b},${a})`;\n  }\n\n  accentHue() {\n    const vibe = this.props.accentVibe || 'Rose';\n    const mode = this.state.dark ? 'dark' : 'light';\n    const [r, g, b] = this.rgb((this.ACCENTS[vibe] || this.ACCENTS.Rose)[mode]);\n    const R = r / 255, G = g / 255, B = b / 255;\n    const mx = Math.max(R, G, B), mn = Math.min(R, G, B), d = mx - mn;\n    let h = 0;\n    if (d) {\n      if (mx === R) h = ((G - B) / d) % 6;\n      else if (mx === G) h = (B - R) / d + 2;\n      else h = (R - G) / d + 4;\n      h *= 60; if (h < 0) h += 360;\n    }\n    return h;\n  }\n\n  componentDidMount() {\n    this._t = setInterval(() => this.setState(s => ({ wordI: (s.wordI + 1) % this.WORDS.length })), 2600);\n\n    const cv = document.getElementById('paint-canvas');\n    if (!cv) return;\n    const ctx = cv.getContext('2d');\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    const resize = () => {\n      cv.width = window.innerWidth * dpr;\n      cv.height = window.innerHeight * dpr;\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n    };\n    resize();\n    this._resize = resize;\n    window.addEventListener('resize', resize);\n\n    this._pt = null;\n    this._last = null;\n    this._phase = 0;\n    this._onMove = (e) => { this._pt = { x: e.clientX, y: e.clientY }; };\n    window.addEventListener('mousemove', this._onMove);\n\n    const loop = () => {\n      const dark = this.state.dark;\n      // slowly fade existing paint toward transparent -> leaves lingering smear\n      ctx.globalCompositeOperation = 'destination-out';\n      ctx.fillStyle = 'rgba(0,0,0,' + (dark ? 0.075 : 0.11) + ')';\n      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);\n\n      const p = this._pt;\n      if (p) {\n        const l = this._last || p;\n        const dist = Math.hypot(p.x - l.x, p.y - l.y);\n        const steps = Math.max(1, Math.floor(dist / 5));\n        ctx.globalCompositeOperation = dark ? 'lighter' : 'source-over';\n        const baseHue = this.accentHue();\n        for (let i = 0; i < steps; i++) {\n          const t = i / steps;\n          const x = l.x + (p.x - l.x) * t;\n          const y = l.y + (p.y - l.y) * t;\n          this._phase += 0.5;\n          const h = baseHue + 34 * Math.sin(this._phase * 0.03);\n          const r = 74;\n          const grad = ctx.createRadialGradient(x, y, 0, x, y, r);\n          const a = dark ? 0.085 : 0.055;\n          const light = dark ? 66 : 82;\n          grad.addColorStop(0, `hsla(${h},88%,${light}%,${a})`);\n          grad.addColorStop(0.5, `hsla(${h + 18},88%,${light}%,${a * 0.5})`);\n          grad.addColorStop(1, `hsla(${h},88%,${light}%,0)`);\n          ctx.fillStyle = grad;\n          ctx.beginPath();\n          ctx.arc(x, y, r, 0, Math.PI * 2);\n          ctx.fill();\n        }\n        this._last = p;\n      }\n      this._raf = requestAnimationFrame(loop);\n    };\n    loop();\n  }\n  componentWillUnmount() {\n    clearInterval(this._t);\n    cancelAnimationFrame(this._raf);\n    window.removeEventListener('mousemove', this._onMove);\n    window.removeEventListener('resize', this._resize);\n  }\n\n  renderVals() {\n    const exp = [\n      { num:'01', company:'Point72', role:'SWE Intern, Risk Technology', dates:'Jul 2026 — Present', loc:'New York, NY',\n        bullets:[\n          'Built Python/Polars and SQL workflows to transform and validate equity risk-model data',\n          'Integrated risk-free-rate factors into an Axioma equity model for production risk infra',\n          'Analyzed factor exposures across models to improve consistency'\n        ] },\n      { num:'02', company:'Hopkins Quant Trading', role:'Head of Development', dates:'Dec 2024 — Present', loc:'Baltimore, MD',\n        bullets:[\n          'Lead the tech team for a 25+ member quant trading club',\n          'Drive full-stack development of the club site — profiles, events, recruiting',\n          'Built a trading-competition simulator with strategy testing and live leaderboards'\n        ] },\n      { num:'03', company:'LS Securities', role:'SWE Intern', dates:'Jul — Aug 2025', loc:'Seoul, Korea',\n        bullets:[\n          'Improved targeting accuracy 37% via segmentation on 540K+ transactions',\n          'Built an RFM + K-Means framework segmenting 25K+ customers',\n          'Raised QA accuracy 24% across 200+ tests on a gold-spot trading product'\n        ] },\n      { num:'04', company:'HopHacks', role:'Website Developer', dates:'Dec 2023 — Present', loc:'Baltimore, MD',\n        bullets:[\n          'Grew participation 86% building the hackathon site',\n          'Helped raise $40.8K+ in sponsorships; submissions up 69%',\n          'Shipped SAML authentication for 1,900+ users'\n        ] },\n      { num:'05', company:'2025 IMC Prosperity', role:'Participant', dates:'Apr 2025', loc:'',\n        bullets:[\n          'Ranked in the top 3% deploying momentum and mean-reversion strategies for live algorithmic trading'\n        ] },\n      { num:'06', company:'Biitech LLC', role:'SWE Intern', dates:'Feb — Mar 2025', loc:'',\n        bullets:[\n          'Developed an outreach automation app for government agencies on the FunnelWhirl platform',\n          'Integrated GPT-powered auto-posting and multi-channel messaging workflows'\n        ] },\n      { num:'07', company:'Bloomberg Global Trading Challenge', role:'Participant', dates:'Oct — Nov 2024', loc:'',\n        bullets:[\n          'Achieved a 13.49% return over 40 days with data-driven strategies and risk optimization via Bloomberg Terminal'\n        ] },\n      { num:'08', company:'DocDoc Pte. Ltd', role:'SWE Intern', dates:'Jan — Feb 2024', loc:'Singapore',\n        bullets:[\n          'Built a Java-based API and refined NLP-driven adjudication logic',\n          'Developed automated testing frameworks and improved system performance'\n        ] }\n    ];\n    const projects = [\n      { kind:'Numerical methods', file:'image-interpolation.md', title:'Image Interpolation Study', desc:'Comparing nearest-neighbor, bilinear, and bicubic upscaling with a numerical-stability lens',\n        long:'Final project for Intro to Computational Mathematics. We implemented nearest-neighbor, bilinear, and bicubic (Catmull-Rom) interpolation from scratch in NumPy to upscale low-resolution images, then evaluated them numerically — measuring reconstruction quality with PSNR, SSIM, and MSE against ground truth, and quantifying each method\\u2019s sensitivity to input noise via condition-number analysis.', tech:['Python','NumPy','SciPy','scikit-image'], repo:'https://github.com/yeoeunyoon/26sp_comp_math_final_project' },\n      { kind:'Simulator', file:'project-two.md', title:'Project Two', desc:'Short description of what this project does and the problem it solves',\n        long:'Placeholder detail — replace with a paragraph on the problem, your approach, and the outcome', tech:['Python','Flask','Postgres'] },\n      { kind:'Tooling', file:'project-three.md', title:'Project Three', desc:'Short description of what this project does and the problem it solves',\n        long:'Placeholder detail — replace with a paragraph on the problem, your approach, and the outcome', tech:['Next.js','Tailwind'] }\n    ];\n\n    const mode = this.state.dark ? 'dark' : 'light';\n    const vibe = this.props.accentVibe || 'Mint';\n    const acc = (this.ACCENTS[vibe] || this.ACCENTS.Mint)[mode];\n    const rootStyle = {\n      ...this.NEUTRAL[mode],\n      '--accent': acc,\n      '--accent-soft': this.hexToSoft(acc),\n      '--bg-blur': mode === 'dark' ? 'rgba(11,11,12,0.55)' : 'rgba(255,255,255,0.55)',\n      minHeight: '100vh',\n      background: 'var(--bg)',\n      color: 'var(--fg)',\n      fontFamily: \"'JetBrains Mono', monospace\",\n      position: 'relative',\n      isolation: 'isolate'\n    };\n\n    const w = this.WORDS[this.state.wordI];\n    const rotWord = React.createElement('span', {\n      key: this.state.wordI,\n      style: { color: 'var(--accent)', display: 'inline-block', animation: 'fadeword .5s ease both' }\n    }, w);\n\n    return {\n      exp, projects, rotWord, rootStyle,\n      themeLabel: this.state.dark ? 'dark' : 'light',\n      showStatus: this.props.showStatus ?? true,\n      statusText: this.props.statusText || 'Open to new-grad roles',\n      toggle: () => this.setState(s => ({ dark: !s.dark })),\n      open: (e) => this.setState({ modalOpen: true, modalI: +e.currentTarget.dataset.idx }),\n      closeModal: () => this.setState({ modalOpen: false }),\n      modalOpen: this.state.modalOpen,\n      mp: projects[this.state.modalI] || projects[0]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
